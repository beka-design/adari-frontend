<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="firebase-config.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    .user-card {
      border: 1px solid #ccc;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
    button {
      padding: 8px 12px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<h2>Admin Dashboard - Pending Payments</h2>
<button id="logoutBtn">Logout</button>

<div id="usersContainer">Loading pending users...</div>

<script>
const auth = firebase.auth();
const db = firebase.firestore();

// ✅ Wait for auth state before doing anything
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // Only allow admin
  if (user.email !== "berekettesfaye137@gmail.com") {
    alert("Access denied");
    window.location.href = "index.html";
    return;
  }

  const container = document.getElementById("usersContainer");

  // ✅ Fetch pending users after admin verified
  db.collection("users")
    .where("subscription", "==", "pending")
    .onSnapshot(snapshot => {

      container.innerHTML = ""; // clear container

      if (snapshot.empty) {
        container.innerHTML = "<p>No pending payments at the moment.</p>";
        return;
      }

      snapshot.forEach(doc => {
        const userData = doc.data();
        const div = document.createElement("div");
        div.className = "user-card";

        div.innerHTML = `
          <p><strong>Name:</strong> ${userData.userName || "-"}</p>
          <p><strong>Phone:</strong> ${userData.userPhone || "-"}</p>
          <p><strong>Plan:</strong> ${userData.plan || "-"} (${userData.planPrice || "-"} ETB)</p>
          <a href="${userData.screenshotUrl || '#'}" target="_blank">View Screenshot</a>
          <br><br>
          <button onclick="approveUser('${doc.id}')">Approve</button>
          <button style="background:red; margin-left:10px;" onclick="rejectUser('${doc.id}')">Reject</button>
        `;

        container.appendChild(div);
      });
    });

});

function approveUser(uid) {

  const now = Date.now();

  // 1️⃣ First get the user document to check plan price
  db.collection("users").doc(uid).get().then(doc => {

    if (!doc.exists) {
      alert("User not found");
      return;
    }

    const userData = doc.data();
    let expiry;

    // 🔥 PLAN LOGIC
    if (userData.planPrice == 200) {
      // 1 Month
      expiry = now + (30 * 24 * 60 * 60 * 1000);
    } else if (userData.planPrice == 400) {
      // 4 Months (120 days approx)
      expiry = now + (120 * 24 * 60 * 60 * 1000);
    } else {
      alert("Unknown plan price");
      return;
    }

    // 2️⃣ Activate user subscription
    db.collection("users").doc(uid).update({
      subscription: "active",
      subscriptionStart: now,
      subscriptionExpiry: expiry
    }).then(() => {

      // 3️⃣ Update payment record
      db.collection("payments")
        .where("uid", "==", uid)
        .where("status", "==", "pending")
        .get()
        .then(snapshot => {
          snapshot.forEach(paymentDoc => {
            paymentDoc.ref.update({
              status: "approved",
              approvedAt: now
            });
          });
        });

      alert("✅ User approved successfully!");

    });

  }).catch(err => {
    console.error(err);
    alert("Error approving user");
  });
}

// ✅ Reject user
function rejectUser(uid) {
  db.collection("users").doc(uid).update({
    subscription: "rejected"
  }).then(() => {
    alert("User rejected.");
  }).catch(err => {
    console.error(err);
    alert("Error rejecting user.");
  });
}

// Logout
document.getElementById("logoutBtn").onclick = () => {
  auth.signOut();
  window.location.href = "login.html";
};
</script>

</body>
</html>
